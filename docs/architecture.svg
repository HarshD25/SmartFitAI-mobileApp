<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SmartFit AI architecture</title>
<desc>Browser captures pose via MediaPipe, sends landmarks and a frame to a Node.js server, which proxies to a Python Flask service running the anthropometric model and MiDaS depth estimation, falling back to local JS logic if that service is unavailable, then returns a brand size match.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="520" fill="#ffffff"/>

<!-- Browser -->
<rect x="240" y="20" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Browser</text>
<text x="340" y="60" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">MediaPipe Pose + camera</text>

<line x1="340" y1="76" x2="340" y2="112" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="430" y="98" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">Landmarks + JPEG frame</text>

<!-- Node server -->
<rect x="220" y="116" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="138" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Node.js server</text>
<text x="340" y="156" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Serves frontend, proxies /api/measure</text>

<line x1="300" y1="172" x2="190" y2="220" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="120" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">Primary</text>
<line x1="380" y1="172" x2="500" y2="220" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="560" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">Fallback</text>

<!-- Python backend -->
<rect x="60" y="224" width="260" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Python / Flask backend</text>
<text x="190" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Anthropometric model + MiDaS depth</text>

<!-- Node fallback module -->
<rect x="400" y="224" width="240" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="520" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Node fallback module</text>
<text x="520" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Same model, no depth correction</text>

<line x1="190" y1="288" x2="190" y2="324" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="520" y1="288" x2="340" y2="324" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Size match -->
<rect x="220" y="328" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="350" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">Size matching</text>
<text x="340" y="368" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">sizes_db.json brand tables</text>

<line x1="340" y1="384" x2="340" y2="420" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="460" y="406" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">Size + confidence</text>

<!-- Results -->
<rect x="240" y="424" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="446" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Results screen</text>
<text x="340" y="464" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">Size, fit, confidence</text>
</svg>
